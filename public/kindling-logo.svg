<svg width="240" height="260" viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kindling">
  <defs>
    <linearGradient id="k-flame" x1="60" y1="2" x2="60" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="0.45" stop-color="#F97316"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="k-rail" x1="30" y1="34" x2="90" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7A5230"/>
      <stop offset="1" stop-color="#5C3D22"/>
    </linearGradient>
  </defs>

  <!-- flame -->
  <g transform="translate(33.2,-4.4) scale(2.2)">
    <path d="M12 2.5c2.2 3.1 3.4 5.2 3.4 7.4 0 1.2-.5 2.2-1.3 2.9.9-.2 1.7-.9 2.2-1.9.9 1.4 1.4 2.9 1.4 4.4A5.7 5.7 0 0 1 12 21a5.7 5.7 0 0 1-5.7-5.7c0-2.6 1.6-4.9 3-6.9.7 1 .9 1.9.7 2.9C11.7 9.3 12.9 6.6 12 2.5Z" fill="url(#k-flame)"/>
    <path d="M12 7.5c1.2 1.9 1.9 3.3 1.9 4.9 0 2.4-1.7 4.3-1.9 4.3-.2 0-1.9-1.9-1.9-4.3 0-1.6.7-3 1.9-4.9Z" fill="#FDE68A" opacity="0.9"/>
  </g>

  <!-- ladder rails (logs) -->
  <g stroke-linecap="round">
    <line x1="50" y1="36" x2="30" y2="128" stroke="url(#k-rail)" stroke-width="9"/>
    <line x1="70" y1="36" x2="90" y2="128" stroke="url(#k-rail)" stroke-width="9"/>
    <!-- subtle grain -->
    <line x1="49" y1="42" x2="33" y2="120" stroke="#4A3018" stroke-width="1.1" opacity="0.35"/>
    <line x1="71" y1="42" x2="87" y2="120" stroke="#4A3018" stroke-width="1.1" opacity="0.35"/>

    <!-- rungs -->
    <line x1="45.5" y1="60" x2="74.5" y2="60" stroke="#6E4A29" stroke-width="7.5"/>
    <line x1="39.5" y1="90" x2="80.5" y2="90" stroke="#6E4A29" stroke-width="7.5"/>
    <line x1="34.5" y1="114" x2="85.5" y2="114" stroke="#6E4A29" stroke-width="7.5"/>
  </g>

  <!-- cut-log ends (lighter faces) -->
  <g fill="#C89B6A">
    <ellipse cx="50" cy="36" rx="4.6" ry="3.4"/>
    <ellipse cx="70" cy="36" rx="4.6" ry="3.4"/>
    <ellipse cx="45.5" cy="60" rx="2.2" ry="3.6"/>
    <ellipse cx="74.5" cy="60" rx="2.2" ry="3.6"/>
    <ellipse cx="39.5" cy="90" rx="2.4" ry="3.8"/>
    <ellipse cx="80.5" cy="90" rx="2.4" ry="3.8"/>
    <ellipse cx="34.5" cy="114" rx="2.6" ry="4"/>
    <ellipse cx="85.5" cy="114" rx="2.6" ry="4"/>
  </g>
</svg>
